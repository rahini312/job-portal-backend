spring.application.name=jobportal
logging.pattern.console=${CONSOLE_LOG_PATTERN:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %cyan(%msg%n)}
#logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.eazybytes.jobportal=${LOG_LEVEL:INFO}

logging.group.jobportal_error=com.eazybytes.jobportal.security,com.eazybytes.jobportal.contact
logging.level.jobportal_error=${LOG_LEVEL_ERROR:ERROR}

#logging.file.name=logs/jobportal.log
#logging.pattern.file={"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%c","message":"%m"}

spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:jobportal}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
#If we have the same value defined in VM options, that will be given high precedence



spring.docker.compose.lifecycle-management=start-and-stop
spring.docker.compose.start.command=up
spring.docker.compose.stop.command=stop

#spring.cache.type = caffeine
#spring.cache.cache.names = jobs, companies, roles
#spring.cache.caffeine.spec = maximumSize = 5000, expireAfterWrite = 1m

cache.job.ttl-minutes = 15

cache.companies.ttl-minutes = 15

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,https://qa.jobportal.eazybytes.com

